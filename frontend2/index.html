<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Platform - Login</title>
  <script src="config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-login">
  <div class="login-card">
    <div class="logo">
      <h1>Resume Platform</h1>
      <p>Build and share your professional resume</p>
    </div>

    <div class="form-group">
      <label for="email">Email address</label>
      <input id="email" type="email" placeholder="you@example.com" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Your password" />
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="login()">Log In</button>
      <button class="btn btn-secondary" onclick="register()">Register</button>
    </div>

    <p id="msg"></p>
  </div>

  <script>
    const COGNITO_URL = `https://cognito-idp.${CONFIG.region}.amazonaws.com/`;

    // ─── LOGIN ───────────────────────────────────────────────
    async function login() {
      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const res = await fetch(COGNITO_URL, {
        method: 'POST',
        headers: {
          'Content-Type':  'application/x-amz-json-1.1',
          'X-Amz-Target':  'AWSCognitoIdentityProviderService.InitiateAuth'
        },
        body: JSON.stringify({
          AuthFlow:   'USER_PASSWORD_AUTH',
          ClientId:    CONFIG.userPoolClientId,
          AuthParameters: {
            USERNAME: email,
            PASSWORD: password
          }
        })
      });

      const data = await res.json();

      if (data.AuthenticationResult) {
        localStorage.setItem('idToken', data.AuthenticationResult.IdToken);
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('msg').innerText =
          '❌ Login failed: ' + (data.message || JSON.stringify(data));
      }
    }

    // ─── REGISTER ────────────────────────────────────────────
    async function register() {
      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) {
        document.getElementById('msg').innerText = '⚠️ Please enter email and password.';
        return;
      }

      // Step 1 — Sign up
      const res = await fetch(COGNITO_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-amz-json-1.1',
          'X-Amz-Target': 'AWSCognitoIdentityProviderService.SignUp'
        },
        body: JSON.stringify({
          ClientId: CONFIG.userPoolClientId,
          Username: email,
          Password: password,
          UserAttributes: [
            { Name: 'email', Value: email }
          ]
        })
      });

      const data = await res.json();

      if (data.UserSub) {
        // Step 2 — Ask for confirmation code
        const code = prompt(
          '✅ Account created! Check your email for a verification code.\n\nEnter code:'
        );

        if (code) {
          await confirmUser(email, code);
        } else {
          document.getElementById('msg').innerText =
            '⚠️ Registration complete. Please verify your email before logging in.';
        }
      } else {
        document.getElementById('msg').innerText =
          '❌ Register failed: ' + (data.message || JSON.stringify(data));
      }
    }

    // ─── CONFIRM SIGN UP ─────────────────────────────────────
    async function confirmUser(email, code) {
      const res = await fetch(COGNITO_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-amz-json-1.1',
          'X-Amz-Target': 'AWSCognitoIdentityProviderService.ConfirmSignUp'
        },
        body: JSON.stringify({
          ClientId:         CONFIG.userPoolClientId,
          Username:         email,
          ConfirmationCode: code
        })
      });

      if (res.ok) {
        document.getElementById('msg').innerText =
          '✅ Email verified! You can now log in.';
      } else {
        const err = await res.json();
        document.getElementById('msg').innerText =
          '❌ Verification failed: ' + (err.message || JSON.stringify(err));
      }
    }
  </script>
</body>
</html>
